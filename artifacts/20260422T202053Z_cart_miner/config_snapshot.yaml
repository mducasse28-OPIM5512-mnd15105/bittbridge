  storage_cache_dir: miner_model_energy/cache
  storage_cache_parquet_name: train_merged.parquet
  storage_force_refresh: false
features:
  use_time_features: true
  include_weather_suffix_groups: []
  use_cyclical_features: false
  use_station_agg_features: false
  use_temp_dew_gap: false
  use_load_lags: false
  use_load_rolling: false
  use_load_delta: false
  load_lag_steps:
  - 24
  rolling_load_windows:
  - 3
  - 6
training:
  validation_split: 0.2
  random_state: 42
  show_training_progress: true
models:
  linear:
    fit_intercept: true
  cart:
    max_depth: 6
    min_samples_split: 10
    min_samples_leaf: 5
  lstm:
    n_steps: 1
    units: 32
    dropout: 0.1
    epochs: 5
    batch_size: 16
    dense_units: 16
    learning_rate: 0.001
    use_early_stopping: true
    early_stopping_patience: 2
    standardize_inputs: false
    fit_verbose: 1
  rnn:
    n_steps: 1
    units: 32
    dropout: 0.1
    epochs: 5
    batch_size: 16
    dense_units: 16
    learning_rate: 0.001
    use_early_stopping: true
    early_stopping_patience: 2
    standardize_inputs: false
    fit_verbose: 1
persistence:
  artifact_dir: /home/mducasse28/bittbridge/artifacts
  save_on_deploy: true
